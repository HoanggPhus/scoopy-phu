<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <title>Mắm Tôm Bắc</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    header {
      background: #4b1e1e;
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 10px;
    }

    .hero {
      padding: 60px;
      text-align: center;
      background: white;
    }

    .hero img {
      width: 300px;
      margin-top: 20px;
    }

    .hero h2 {
      font-size: 60px;
      color: #4b1e1e;
    }

    .btn {
      background: #4b1e1e;
      color: white;
      padding: 15px 30px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-size: 18px;
    }

    .products {
      padding: 50px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      margin-top: 40px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .card img {
      width: 180px;
    }

    footer {
      background: black;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 50px;
    }
  </style>
</head>

<body>

<header>
  <h1>🦐 MẮM TÔM BẮC</h1>

  <nav>
    <a href="#">Trang chủ</a>
    <a href="#">Sản phẩm</a>
    <a href="#">Liên hệ</a>
  </nav>
</header>

<section class="hero">

  <h2>MẮM TÔM CHÍNH GỐC</h2>

  <p>
    Đậm đà hương vị Bắc Bộ 🇻🇳
  </p>

  <button class="btn">
    Đặt hàng ngay 🚀
  </button>

  <br><br>

  <img src="https://images.unsplash.com/photo-1515003197210-e0cd71810b5f?q=80&w=1200&auto=format&fit=crop">

</section>

<section class="products">

  <h2>SẢN PHẨM NỔI BẬT 🔥</h2>

  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1515003197210-e0cd71810b5f?q=80&w=1200&auto=format&fit=crop">

      <h3>Mắm Tôm Bắc</h3>

      <p>89.000đ</p>

      <button class="btn">Mua ngay</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1515003197210-e0cd71810b5f?q=80&w=1200&auto=format&fit=crop">

      <h3>Mắm Tôm Premium</h3>

      <p>149.000đ</p>

      <button class="btn">Mua ngay</button>
    </div>

  </div>

</section>

<footer>
  © 2026 Mắm Tôm Bắc
</footer>

</body>
</html>
